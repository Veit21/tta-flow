name: "UNet"
module: models.unet.UNetModelWrapper
params:
  dim: [1, 128, 128]              # [1, 224, 224]
  num_res_blocks: 2
  num_channels: 128
  channel_mult: [1, 1, 2, 3, 4]   # [1, 1, 2, 2, 4, 4]
  num_heads: 4
  num_head_channels: 64
  attention_resolutions: "16"
  dropout: 0.1
  remove_noise_conditioning: True     # Turn off/on noise conditioning of the model
q_z: "gaussian"
sigma: 0.0  